{% load static %}
<!-- Хедер -->
<header class="site-header">
    <div class="container">
        <a href="{% url 'main:main' %}" class="logo">
            <i class="fas fa-pills"></i>
            <span class="logo-text">Аптечная полка</span>
        </a>

        <!-- Навигация для всех пользователей -->
        <nav class="main-nav">
            <a href="#" class="nav-link">
                    <i class="fas fa-tablets"></i> Поиск лекарств в других аптечках
                </a>
            {% if user.is_authenticated %}
                <a href="{% url 'users:profile_section' 'my_profile' %}" class="nav-link">
                    <i class="fas fa-user"></i> Профиль
                </a>
                <a href="{% url 'users:logout' %}" class="nav-link">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </a>
            {% else %}
                <a href="{% url 'users:register' %}" class="nav-link">
                    <i class="fas fa-user-plus"></i> Регистрация
                </a>
                <a href="{% url 'users:login' %}" class="nav-link">
                    <i class="fas fa-sign-in-alt"></i> Войти
                </a>
            {% endif %}
        </nav>
    </div>
</header>
